# ----------------------------------------------------------------------------
# Plugins on TMUX plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-urlview'

# ----------------------------------------------------------------------------
# TMUX settigns (for Plugins)

# auto start terminal
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'
# auto restore tmux
set -g @continuum-restore 'on'

# ----------------------------------------------------------------------------
# TMUX settigns

# prefix key | change to C-q (press twice to send a literal C-q)
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# command | prefix + r | reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded."

# base setting | use zsh as the shell when tmux starts
set -g default-shell /bin/zsh
# base setting | enable 256-color display in tmux
set -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'
# base setting | start window and pane numbering at 1 (default 0)
set -g base-index 1
set-window-option -g pane-base-index 1
# reduce the keystroke delay
set -sg escape-time 0
## enable visual notifications
setw -g monitor-activity on
set -g visual-activity on
# enable mouse operation
# - in exchange, copying text via mouse range-selection requires holding the Option key.
set -g mouse on
# bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
# bind -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
# bind -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"
bind-key -T edit-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T edit-mode-vi WheelDownPane send-keys -X scroll-down
# change the history limit (default 2000)
set -g history-limit 10000

# ----------------------------------------------------------------------------
# Status bar

# status bar | place at the top
set -g status-position top
# status bar | redraw every 1 second
set -g status-interval 1
# status bar | overall
set -g status-style bg=colour234,fg=colour255
# status bar | left | length
set -g status-left-length 90
# status bar | left | content | #S => session name, #H => HostName, #P => pane number
set -g status-left-style bg=colour4
set -g status-left "  [Session]  #S    "
# status bar | center | center-aligned (mainly window numbers, etc.)
set -g status-justify centre
# status bar | center | window-status format for the current window (#I => window index, W => window name)
setw -g window-status-current-style bg=colour32
# setw -g window-status-current-fg white
# setw -g window-status-current-bg colour32
# setw -g window-status-current-attr bright
# status bar | right | length
set -g status-right-length 90
# status bar | right | content | Wi-Fi, battery remaining, current time (shown at the far right)
# set -g status-right '#(wifi)  #(battery --tmux)  #[bg=colour4] %Y-%m-%d(%a) %H:%M #[default]'
set -g status-right '#{cpu_bg_color} CPU: #{cpu_icon} #{cpu_percentage} #[bg=colour4] %Y-%m-%d(%a) %H:%M #[default]'

# ----------------------------------------------------------------------------
# Pane

# set the pane border color
set -g pane-border-style fg=black
set -g pane-active-border-style fg=blue
# make the active pane stand out
# set -g pane-active-border-fg white
# set -g pane-active-border-bg yellow

# ----------------------------------------------------------------------------
# Key bindings

setw -g mode-keys vi
# command | pane navigation (vim key bindings)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# command | pane resize (vim key bindings)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# command | prefix + c | create a window
bind c new-window -c '#{pane_current_path}'
# command | prefix + | | split the pane horizontally
bind | split-window -h -c '#{pane_current_path}'
# command | prefix + - | split the pane vertically
bind - split-window -v -c '#{pane_current_path}'

# ----------------------------------------------------------------------------
# Copy mode

# command | v | start selection
bind -T copy-mode-vi v send -X begin-selection
# command | V | select line
bind -T copy-mode-vi V send -X select-line
# command | C-v | rectangle selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
# command | y | yank
bind -T copy-mode-vi y send -X copy-selection
# command | Y | yank line
bind -T copy-mode-vi Y send -X copy-line
# command | C-p | paste
bind C-p paste-buffer
# command (in vi mode) | Ctrl-a to go to the start of the line (Emacs-like)
# bind-key -T copy-mode-vi C-a start-of-line
# command (in vi mode) | Ctrl-e to go to the end of the line (Emacs-like)
# bind-key -T copy-mode-vi C-e end-of-line

# ----------------------------------------------------------------------------
# Utility

# command | prefix + R | reload the shell
bind R run-shell 'bash $HOME/.config/tmux/respawn_all' \; display "Shell Reloaded."

# command | prefix + a | synchronize a command across all panes
bind a set-window-option synchronize-panes on
bind A set-window-option synchronize-panes off

# ----------------------------------------------------------------------------
# TMUX plugin manager (tpm)

# Install if no tpm
# https://github.com/tmux-plugins/tpm/blob/master/docs/automatic_tpm_installation.md
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager
# (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
