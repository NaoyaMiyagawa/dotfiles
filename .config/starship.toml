##############################################################################
# Starship settings
#
# https://starship.rs/config/
##############################################################################

# wait 10 milliseconds for starship to check files under the current directory
scan_timeout = 10
command_timeout = 250
# enable a newline at the start of the prompt
add_newline = true

[hostname]
ssh_only = true
format = "[$hostname:](bold blue) "
disabled = false

# path name | prevent truncated display
[directory]
truncation_length = 100
truncate_to_repo = false
truncation_symbol = ".../"

[git_branch]
format = "[$symbol$branch]($style) "

[git_status]
# set to true to speed things up when responses are too slow in a docker dev environment
# disabled = true
format = '([\[$all_status $ahead_behind\]]($style) )'
style = "blue"

# status
staged = '[+${count}](green)'
modified = '[!${count}](yellow)'
deleted = "[✘${count}](red)"

# ahead_behind
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"

# [git_metrics]
# disabled = false
# format = '([+$added]($added_style)/)([-$deleted]($deleted_style) )'

[character]
success_symbol = "[❯](bold blue)"

# ----------------------------------------------------------------------------
# Version-related
# ----------------------------------------------------------------------------

[docker_context]
format = "[$symbol]($style) "

[package]
disabled = true

[nodejs]
disabled = true
format = "[$symbol($version )]($style)"
symbol = "⬢:"

[php]
disabled = true
format = "[$symbol($version )]($style)"
symbol = "🐘:"

[aws]
format = '[$profile]($style) '
symbol = "☁️:"
style = "bold 110"

[terraform]
format = "[$symbol$workspace]($style) "
symbol = "💠:"

[python]
# format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\))]($style)'
format = '[${symbol}(${version} )(\($virtualenv\))]($style)'
style = "yellow"
symbol = "🐍:"
pyenv_version_name = true

[vagrant]
format = "[$symbol($version )]($style)"
symbol = "⍱:"

[cmd_duration]
format = "[took $duration](yellow)"
