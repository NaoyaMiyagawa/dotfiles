[alias]
    vacuum = "!f () { git checkout $1; git branch --merged | egrep -v '\\*|develop|main' | xargs git branch -d; git fetch --prune; };f"
    # git-sweep: smarter vacuum — also catches squash/rebase-merged PRs (via gh)
    # and protects unpushed local spikes. Run `git sweep --help` for options.
    sweep = "!$HOME/dotfiles/bin/git-sweep"
    uncommit = reset --soft HEAD^
