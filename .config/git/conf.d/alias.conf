[alias]
    vacuum = "!f () { git checkout $1; git branch --merged | egrep -v '\\*|develop|main' | xargs git branch -d; git fetch --prune; };f"
    # git-branch-sweep: smarter vacuum — also catches squash/rebase-merged PRs
    # (via gh) and protects unpushed local spikes. Installed via Homebrew tap
    # (NaoyaMiyagawa/tap/git-branch-sweep). Run `git sweep -h` for options.
    sweep = branch-sweep
    uncommit = reset --soft HEAD^
